name: sogou-news-bigdata-lab

services:
  mysql:
    image: mysql:8.0
    container_name: news-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-news}
      MYSQL_USER: ${DB_USER:-hive}
      MYSQL_PASSWORD: ${DB_PASSWORD:-bigdata123}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-3308}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks: [news-net]

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: news-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    healthcheck:
      test: ["CMD-SHELL", "cub zk-ready localhost:2181 20"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks: [news-net]

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    container_name: news-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:${KAFKA_PORT:-9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:29092 --list >/dev/null 2>&1"]
      interval: 5s
      timeout: 10s
      retries: 30
    networks: [news-net]

  jobmanager:
    image: shizr/sogou-news-bigdata-lab-flink:1.0.0
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: news-flink-jobmanager
    command: jobmanager
    ports:
      - "${FLINK_PORT:-8081}:8081"
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
    networks: [news-net]

  taskmanager:
    image: shizr/sogou-news-bigdata-lab-flink:1.0.0
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: news-flink-taskmanager
    command: taskmanager
    depends_on: [jobmanager]
    environment:
      JOB_MANAGER_RPC_ADDRESS: jobmanager
      TASK_MANAGER_NUMBER_OF_TASK_SLOTS: 2
    networks: [news-net]

  flink-job:
    image: shizr/sogou-news-bigdata-lab-flink:1.0.0
    build:
      context: .
      dockerfile: Dockerfile.flink
    container_name: news-flink-job
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      jobmanager:
        condition: service_started
      taskmanager:
        condition: service_started
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${DB_NAME:-news}?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      DB_USER: ${DB_USER:-hive}
      DB_PASSWORD: ${DB_PASSWORD:-bigdata123}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sougoulogs}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        until curl -fsS http://jobmanager:8081/overview >/dev/null; do sleep 2; done
        flink run -d -m jobmanager:8081 -c com.bigdata.flink.stream.KafkaFlinkMySQL /opt/flink/usrlib/news-analysis.jar
    restart: "no"
    networks: [news-net]

  log-producer:
    image: shizr/sogou-news-bigdata-lab-producer:1.0.0
    build: ./docker/producer
    container_name: news-log-producer
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_TOPIC: ${KAFKA_TOPIC:-sougoulogs}
      PRODUCER_INTERVAL_SECONDS: ${PRODUCER_INTERVAL_SECONDS:-0.5}
      PRODUCER_DYNAMIC_TITLES: ${PRODUCER_DYNAMIC_TITLES:-true}
      PRODUCER_UNIQUE_EVERY: ${PRODUCER_UNIQUE_EVERY:-5}
      PRODUCER_TOPIC_POOL_SIZE: ${PRODUCER_TOPIC_POOL_SIZE:-0}
      PRODUCER_INCLUDE_RUN_LABEL: ${PRODUCER_INCLUDE_RUN_LABEL:-true}
      PRODUCER_RUN_LABEL: ${PRODUCER_RUN_LABEL:-}
      PRODUCER_CONTROL_ENABLED: ${PRODUCER_CONTROL_ENABLED:-true}
      PRODUCER_START_ENABLED: ${PRODUCER_START_ENABLED:-false}
      PRODUCER_CONTROL_POLL_SECONDS: ${PRODUCER_CONTROL_POLL_SECONDS:-2}
      PRODUCER_CONTROL_TABLE: ${PRODUCER_CONTROL_TABLE:-producer_control}
      PRODUCER_RESET_CONTROL_ON_START: ${PRODUCER_RESET_CONTROL_ON_START:-true}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-news}
      DB_USER: ${DB_USER:-hive}
      DB_PASSWORD: ${DB_PASSWORD:-bigdata123}
      SOURCE_FILE: /data/sougou.log
    volumes:
      - ./data:/data:ro
    restart: unless-stopped
    networks: [news-net]

  dashboard:
    image: shizr/sogou-news-bigdata-lab-dashboard:1.0.0
    build: ./dashboard
    container_name: news-dashboard
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-news}
      DB_USER: ${DB_USER:-hive}
      DB_PASSWORD: ${DB_PASSWORD:-bigdata123}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4.1-mini}
      AUTO_SEED_ON_EMPTY: ${AUTO_SEED_ON_EMPTY:-true}
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    restart: unless-stopped
    networks: [news-net]

volumes:
  mysql-data:

networks:
  news-net:
    driver: bridge
